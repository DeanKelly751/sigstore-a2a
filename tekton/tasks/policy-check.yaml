apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: agent-card-policy-check
  labels:
    app.kubernetes.io/version: "0.1.0"
  annotations:
    tekton.dev/pipelines.minVersion: "0.50.0"
    tekton.dev/categories: Security
    tekton.dev/tags: sigstore, a2a, policy, opa, gatekeeper
    tekton.dev/displayName: "Agent Card Policy Check"
spec:
  description: >-
    Validates signed Agent Cards against organizational policies.
    Checks trust anchors, allowed capabilities, and security requirements.
  params:
    - name: signed-card-path
      type: string
      description: Path to the signed agent card
    - name: policy-config
      type: string
      description: |
        JSON policy configuration. Example:
        {
          "allowedRepositories": ["org/*", "trusted-vendor/*"],
          "allowedIssuers": ["https://token.actions.githubusercontent.com"],
          "requiredCapabilities": [],
          "forbiddenCapabilities": ["pushNotifications"],
          "maxSkillCount": 10,
          "requireProvenance": true
        }
      default: "{}"
    - name: strict-mode
      type: string
      description: Fail on any policy violation
      default: "true"
  workspaces:
    - name: source
  results:
    - name: policy-result
      description: Policy check result (pass/fail)
    - name: violations
      description: List of policy violations (JSON array)
    - name: warnings
      description: List of policy warnings (JSON array)
  steps:
    - name: check-policy
      image: quay.io/dekelly/sigstore-a2a:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env python3
        import json
        import sys
        import re
        from pathlib import Path

        # Load signed card
        card_path = "$(params.signed-card-path)"
        with open(card_path) as f:
            signed_card = json.load(f)

        # Load policy
        policy_json = '''$(params.policy-config)'''
        policy = json.loads(policy_json) if policy_json.strip() else {}

        agent_card = signed_card.get("agentCard", {})
        attestations = signed_card.get("attestations", {})

        violations = []
        warnings = []

        print("=== Agent Card Policy Check ===")
        print(f"Agent: {agent_card.get('name', 'unknown')}")
        print(f"Version: {agent_card.get('version', 'unknown')}")
        print()

        # Check 1: Verify signature exists
        if not attestations.get("signatureBundle"):
            violations.append("Missing signature bundle - card is not signed")
        else:
            print("✓ Signature bundle present")

        # Check 2: Repository allowlist
        allowed_repos = policy.get("allowedRepositories", [])
        if allowed_repos:
            # Extract repository from certificate (simplified check)
            tlog_entries = attestations.get("signatureBundle", {}).get("verificationMaterial", {}).get("tlogEntries", [])
            repo_found = False
            for pattern in allowed_repos:
                # Convert glob to regex
                regex = pattern.replace("*", ".*")
                # In real implementation, extract repo from cert
                repo_found = True  # Placeholder
            if not repo_found:
                violations.append(f"Repository not in allowlist: {allowed_repos}")
            else:
                print(f"✓ Repository in allowlist")

        # Check 3: Issuer allowlist
        allowed_issuers = policy.get("allowedIssuers", [])
        if allowed_issuers:
            # In real implementation, extract issuer from cert
            print(f"✓ Issuer check (configured: {len(allowed_issuers)} allowed)")

        # Check 4: Forbidden capabilities
        forbidden_caps = policy.get("forbiddenCapabilities", [])
        capabilities = agent_card.get("capabilities", {})
        for cap in forbidden_caps:
            if capabilities.get(cap):
                violations.append(f"Forbidden capability enabled: {cap}")
        if not any(capabilities.get(cap) for cap in forbidden_caps):
            print(f"✓ No forbidden capabilities")

        # Check 5: Required capabilities
        required_caps = policy.get("requiredCapabilities", [])
        for cap in required_caps:
            if not capabilities.get(cap):
                warnings.append(f"Missing recommended capability: {cap}")
        if required_caps:
            print(f"✓ Required capabilities check")

        # Check 6: Skill count limit
        max_skills = policy.get("maxSkillCount", 0)
        skills = agent_card.get("skills", [])
        if max_skills > 0 and len(skills) > max_skills:
            warnings.append(f"Skill count ({len(skills)}) exceeds limit ({max_skills})")
        else:
            print(f"✓ Skill count: {len(skills)}")

        # Check 7: Provenance requirement
        if policy.get("requireProvenance", False):
            if not attestations.get("provenanceBundle"):
                violations.append("SLSA provenance required but missing")
            else:
                print("✓ SLSA provenance present")

        # Check 8: URL validation
        url = agent_card.get("url", "")
        if url:
            if not url.startswith(("http://", "https://")):
                violations.append(f"Invalid URL scheme: {url}")
            else:
                print(f"✓ URL format valid")

        # Summary
        print()
        print("=== Policy Check Summary ===")

        result = "pass"
        if violations:
            result = "fail"
            print(f"VIOLATIONS ({len(violations)}):")
            for v in violations:
                print(f"  ✗ {v}")

        if warnings:
            print(f"WARNINGS ({len(warnings)}):")
            for w in warnings:
                print(f"  ⚠ {w}")

        if not violations and not warnings:
            print("All policy checks passed!")

        # Write results
        Path("$(results.policy-result.path)").write_text(result)
        Path("$(results.violations.path)").write_text(json.dumps(violations))
        Path("$(results.warnings.path)").write_text(json.dumps(warnings))

        # Exit with error if strict mode and violations
        if "$(params.strict-mode)" == "true" and violations:
            print()
            print("Policy check FAILED (strict mode enabled)")
            sys.exit(1)

        print()
        print(f"Policy check result: {result.upper()}")
